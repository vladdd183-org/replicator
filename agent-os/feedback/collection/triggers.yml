# Feedback Collection Triggers
# Определяет когда и какие вопросы задавать

version: "1.0.0"

# ═══════════════════════════════════════════════════════════════
# After Implementation
# ═══════════════════════════════════════════════════════════════

after_implementation:
  description: "Фидбек после завершения реализации"
  condition: task_completed
  delay: immediate
  
  questions:
    - id: satisfaction
      type: rating
      text: "Оцените результат (1-5):"
      scale: [1, 5]
      required: true
      emoji_scale:
        1: "😞"
        2: "😕"
        3: "😐"
        4: "🙂"
        5: "😊"
      
    - id: correct
      type: binary
      text: "Реализация соответствует требованиям?"
      options:
        yes: "✅ Да"
        no: "❌ Нет"
      required: true
      
    - id: issues
      type: multiple_choice
      text: "Были ли проблемы?"
      condition: "correct == no OR satisfaction <= 3"
      allow_multiple: true
      options:
        wrong_approach: "Неправильный подход"
        missing_features: "Не хватает функционала"
        code_quality: "Качество кода"
        conventions: "Нарушение конвенций"
        performance: "Производительность"
        other: "Другое"
        
    - id: comment
      type: text
      text: "Комментарий (опционально):"
      required: false
      max_length: 500

# ═══════════════════════════════════════════════════════════════
# After Error Fix
# ═══════════════════════════════════════════════════════════════

after_error_fix:
  description: "Фидбек после исправления ошибки"
  condition: error_marked_resolved
  delay: immediate
  
  questions:
    - id: fixed
      type: binary
      text: "Ошибка исправлена?"
      options:
        yes: "✅ Да, исправлена"
        no: "❌ Нет, проблема осталась"
      required: true
      
    - id: fix_quality
      type: rating
      text: "Качество исправления (1-5):"
      condition: "fixed == yes"
      scale: [1, 5]
      
    - id: iterations
      type: number
      text: "Сколько попыток потребовалось?"
      condition: "fixed == yes"
      min: 1
      max: 10
      
    - id: root_cause
      type: text
      text: "Что было причиной ошибки?"
      condition: "fixed == yes"
      required: false
      hint: "Это поможет предотвратить похожие ошибки"
      
    - id: still_broken
      type: text
      text: "Опишите, что не работает:"
      condition: "fixed == no"
      required: true

# ═══════════════════════════════════════════════════════════════
# After Session
# ═══════════════════════════════════════════════════════════════

after_session:
  description: "Фидбек после длительной сессии"
  condition: "session_duration > 15min"
  delay: on_session_end
  
  questions:
    - id: session_rating
      type: rating
      text: "Как прошла сессия? (1-5)"
      scale: [1, 5]
      required: true
      
    - id: accomplished
      type: binary
      text: "Удалось выполнить запланированное?"
      options:
        yes: "✅ Да"
        partial: "🔶 Частично"
        no: "❌ Нет"
        
    - id: blockers
      type: multiple_choice
      text: "Что мешало?"
      condition: "accomplished != yes"
      allow_multiple: true
      options:
        misunderstanding: "Непонимание требований"
        errors: "Ошибки в генерации"
        slow: "Медленная работа"
        context_lost: "Потеря контекста"
        other: "Другое"

# ═══════════════════════════════════════════════════════════════
# Weekly Survey
# ═══════════════════════════════════════════════════════════════

weekly_survey:
  description: "Еженедельный опрос удовлетворённости"
  schedule:
    day: friday
    time: "17:00"
  
  questions:
    - id: overall_satisfaction
      type: rating
      text: "Общая удовлетворённость за неделю (1-5):"
      scale: [1, 5]
      required: true
      
    - id: best_aspects
      type: multiple_choice
      text: "Что работало лучше всего?"
      allow_multiple: true
      max_selections: 3
      options:
        code_generation: "📝 Генерация кода"
        debugging: "🐛 Отладка"
        explanations: "💡 Объяснения"
        architecture: "🏗️ Архитектурные решения"
        speed: "⚡ Скорость работы"
        understanding: "🎯 Понимание требований"
        
    - id: improvement_areas
      type: multiple_choice
      text: "Что нужно улучшить?"
      allow_multiple: true
      max_selections: 3
      options:
        accuracy: "🎯 Точность кода"
        speed: "⚡ Скорость"
        understanding: "💭 Понимание требований"
        conventions: "📐 Следование конвенциям"
        consistency: "🔄 Консистентность"
        memory: "🧠 Запоминание контекста"
        
    - id: nps
      type: rating
      text: "Порекомендовали бы коллегам? (0-10)"
      scale: [0, 10]
      labels:
        0: "Точно нет"
        10: "Точно да"
        
    - id: suggestions
      type: text
      text: "Предложения по улучшению:"
      required: false
      max_length: 1000

# ═══════════════════════════════════════════════════════════════
# Quick Feedback
# ═══════════════════════════════════════════════════════════════

quick_feedback:
  description: "Быстрый фидбек по запросу"
  condition: user_requested
  
  questions:
    - id: quick_rating
      type: rating
      text: "👍 / 👎"
      scale: [1, 5]
      emoji_only: true
      
    - id: quick_comment
      type: text
      text: "Комментарий:"
      required: false
      max_length: 200
