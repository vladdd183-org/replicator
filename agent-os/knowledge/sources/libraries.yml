# Library Documentation Sources
# Version: 1.0.0

version: "1.0.0"
mcp_server: user-context7

libraries:
  # ═══════════════════════════════════════════════════════════════
  # Web Framework
  # ═══════════════════════════════════════════════════════════════
  
  litestar:
    name: Litestar
    query: "litestar python web framework"
    description: "ASGI web framework for Python"
    priority: high
    
    topics:
      core:
        - routing
        - controllers
        - request_handling
        - response_handling
        
      features:
        - middleware
        - guards
        - dependency_injection
        - events
        - channels
        - websockets
        - cli
        
      advanced:
        - plugins
        - openapi
        - testing
        - lifecycle
        
    common_questions:
      - "How to create middleware in Litestar"
      - "Litestar dependency injection"
      - "Litestar event listeners"
      - "Litestar guards and authentication"

  # ═══════════════════════════════════════════════════════════════
  # ORM
  # ═══════════════════════════════════════════════════════════════
  
  piccolo:
    name: Piccolo ORM
    query: "piccolo orm python async"
    description: "Async ORM for Python with migrations"
    priority: high
    
    topics:
      core:
        - tables
        - columns
        - queries
        - filters
        
      features:
        - migrations
        - transactions
        - raw_sql
        - relationships
        - piccolo_admin
        
      advanced:
        - m2m
        - json_columns
        - array_columns
        - custom_types
        
    common_questions:
      - "Piccolo migration syntax"
      - "Piccolo transaction handling"
      - "Piccolo relationships"
      - "Piccolo raw SQL queries"

  # ═══════════════════════════════════════════════════════════════
  # Dependency Injection
  # ═══════════════════════════════════════════════════════════════
  
  dishka:
    name: Dishka
    query: "dishka python dependency injection"
    description: "Dependency injection framework for Python"
    priority: high
    
    topics:
      core:
        - providers
        - scopes
        - provide_decorator
        
      integrations:
        - litestar
        - fastapi
        - testing
        
      patterns:
        - factory
        - alias
        - override
        
    common_questions:
      - "Dishka provider scopes"
      - "Dishka with Litestar"
      - "Dishka testing mocks"

  # ═══════════════════════════════════════════════════════════════
  # Functional Programming
  # ═══════════════════════════════════════════════════════════════
  
  returns:
    name: Returns
    query: "returns python dry-python"
    description: "Typed functional programming in Python"
    priority: high
    
    topics:
      containers:
        - result
        - maybe
        - io
        - future
        
      patterns:
        - railway_oriented
        - bind
        - map
        - flow
        - pipe
        
      integration:
        - mypy
        - pytest
        
    common_questions:
      - "Returns Result pattern"
      - "Returns railway oriented programming"
      - "Returns bind vs map"
      - "Returns flow composition"

  # ═══════════════════════════════════════════════════════════════
  # Async
  # ═══════════════════════════════════════════════════════════════
  
  anyio:
    name: AnyIO
    query: "anyio python async"
    description: "Async compatibility layer"
    priority: medium
    
    topics:
      concurrency:
        - task_groups
        - cancellation
        - timeouts
        
      synchronization:
        - locks
        - events
        - semaphores
        
      threads:
        - to_thread
        - from_thread
        
    common_questions:
      - "AnyIO task groups"
      - "AnyIO to_thread run_sync"
      - "AnyIO cancellation"

  # ═══════════════════════════════════════════════════════════════
  # GraphQL
  # ═══════════════════════════════════════════════════════════════
  
  strawberry:
    name: Strawberry GraphQL
    query: "strawberry graphql python"
    description: "Python GraphQL library"
    priority: medium
    
    topics:
      schema:
        - types
        - input_types
        - enums
        - scalars
        
      operations:
        - queries
        - mutations
        - subscriptions
        
      advanced:
        - dataloaders
        - extensions
        - permissions
        
    common_questions:
      - "Strawberry resolver arguments"
      - "Strawberry dataloaders"
      - "Strawberry Litestar integration"

  # ═══════════════════════════════════════════════════════════════
  # Validation
  # ═══════════════════════════════════════════════════════════════
  
  pydantic:
    name: Pydantic v2
    query: "pydantic v2 python"
    description: "Data validation using Python type hints"
    priority: high
    
    topics:
      models:
        - base_model
        - dataclasses
        - frozen
        
      validation:
        - validators
        - field_validators
        - model_validators
        
      features:
        - settings
        - serialization
        - aliases
        - computed_fields
        
    common_questions:
      - "Pydantic v2 validators"
      - "Pydantic BaseSettings"
      - "Pydantic frozen models"

  # ═══════════════════════════════════════════════════════════════
  # Background Tasks
  # ═══════════════════════════════════════════════════════════════
  
  taskiq:
    name: TaskIQ
    query: "taskiq python task queue"
    description: "Async task queue for Python"
    priority: medium
    
    topics:
      core:
        - brokers
        - workers
        - tasks
        
      features:
        - scheduling
        - retries
        - dependencies
        
      integrations:
        - redis
        - rabbitmq
        - litestar
        
    common_questions:
      - "TaskIQ broker setup"
      - "TaskIQ with Litestar"
      - "TaskIQ scheduled tasks"
