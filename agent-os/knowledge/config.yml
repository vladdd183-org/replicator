# Knowledge Integration Configuration
# Version: 1.0.0

version: "1.0.0"

# ═══════════════════════════════════════════════════════════════
# Source Priority
# ═══════════════════════════════════════════════════════════════

priority:
  # Приоритет источников (выше число = выше приоритет)
  internal: 100
  project_memory: 90
  libraries: 70
  external: 50

# ═══════════════════════════════════════════════════════════════
# Search Settings
# ═══════════════════════════════════════════════════════════════

search:
  # Стратегия по умолчанию
  default_strategy: hierarchical
  
  # Доступные стратегии
  strategies:
    hierarchical:
      description: "Искать от internal к external"
      order: [internal, project_memory, libraries, external]
      stop_on_sufficient: true
      sufficient_threshold: 3  # results
      
    targeted:
      description: "Искать в конкретном источнике"
      order: null  # Определяется при запросе
      
    comprehensive:
      description: "Искать везде параллельно"
      order: null
      parallel: true
      
  # Лимиты
  limits:
    max_results_per_source: 5
    max_total_results: 15
    timeout_seconds: 30
    
  # Ранжирование
  ranking:
    factors:
      relevance: 0.4
      recency: 0.2
      source_priority: 0.3
      quality: 0.1

# ═══════════════════════════════════════════════════════════════
# Internal Sources
# ═══════════════════════════════════════════════════════════════

internal:
  sources:
    - name: project_docs
      path: ../../../docs/
      patterns: ["*.md"]
      index: true
      priority: 100
      
    - name: agent_os_standards
      path: ../standards/
      patterns: ["*.md", "*.yml"]
      index: true
      priority: 95
      
    - name: agent_os_templates
      path: ../templates/
      patterns: ["*.template"]
      index: true
      priority: 90
      
    - name: memory_knowledge
      path: ../memory/knowledge/
      patterns: ["*.md"]
      index: true
      priority: 85
      
    - name: memory_learning
      path: ../memory/learning/
      patterns: ["*.md"]
      index: true
      priority: 80
      
    - name: claude_md
      path: ../../../CLAUDE.md
      index: true
      priority: 100
      
  # Исключения
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/migrations/**"

# ═══════════════════════════════════════════════════════════════
# Library Documentation
# ═══════════════════════════════════════════════════════════════

libraries:
  mcp_server: user-context7
  
  sources:
    - name: litestar
      query: "litestar python web framework"
      aliases: ["starlite"]
      topics:
        - routing and controllers
        - middleware
        - dependency injection
        - events and listeners
        - websockets
        - channels
        - request handling
        - response handling
        - guards and authentication
        
    - name: piccolo
      query: "piccolo orm python"
      topics:
        - table definitions
        - queries and filters
        - migrations
        - transactions
        - raw sql
        - relationships
        
    - name: dishka
      query: "dishka python dependency injection"
      topics:
        - providers
        - scopes
        - litestar integration
        - testing
        
    - name: returns
      query: "returns python functional programming"
      aliases: ["dry-python/returns"]
      topics:
        - result type
        - maybe type
        - io container
        - railway oriented programming
        - flow and pipe
        
    - name: anyio
      query: "anyio python async"
      topics:
        - task groups
        - cancellation scopes
        - synchronization primitives
        - to_thread
        
    - name: strawberry
      query: "strawberry graphql python"
      topics:
        - types and schemas
        - resolvers
        - mutations
        - subscriptions
        - dataloaders
        
    - name: pydantic
      query: "pydantic v2 python"
      topics:
        - base model
        - validation
        - settings
        - field types
        - custom validators
        
    - name: taskiq
      query: "taskiq python task queue"
      topics:
        - brokers
        - workers
        - scheduling
        - dependencies

# ═══════════════════════════════════════════════════════════════
# External Sources
# ═══════════════════════════════════════════════════════════════

external:
  sources:
    - name: web_search
      mcp_server: user-parrallel
      tool: web_search
      use_for:
        - error_resolution
        - recent_updates
        - community_solutions
        - changelog_lookups
      rate_limit:
        requests: 10
        period: hour
        
    - name: arxiv
      mcp_server: user-arxiv-mcp-server
      use_for:
        - algorithms
        - formal_methods
        - distributed_systems
        - ml_patterns
      categories:
        - cs.SE   # Software Engineering
        - cs.DC   # Distributed Computing
        - cs.AI   # Artificial Intelligence
        - cs.LG   # Machine Learning
      max_results: 5
      
    - name: github
      mcp_server: user-parrallel
      tool: web_fetch
      use_for:
        - code_examples
        - issue_solutions
        - release_notes
      domains:
        - github.com

# ═══════════════════════════════════════════════════════════════
# Caching
# ═══════════════════════════════════════════════════════════════

cache:
  enabled: true
  path: cache/
  
  ttl:
    internal: null           # Не кэшируем (всегда свежие)
    libraries: 168           # 7 days in hours
    web_search: 24           # 1 day
    arxiv: 720               # 30 days
    github: 24               # 1 day
    
  max_size_mb: 100
  
  cleanup:
    schedule: daily
    remove_expired: true
    remove_unused_after_days: 30

# ═══════════════════════════════════════════════════════════════
# Synthesis
# ═══════════════════════════════════════════════════════════════

synthesis:
  enabled: true
  output_path: synthesis/
  
  types:
    comparison:
      template: retrieval/prompts/comparison.md
      output: synthesis/comparisons/{topic}.md
      
    guide:
      template: retrieval/prompts/guide.md
      output: synthesis/guides/{topic}.md
      
    decision:
      template: retrieval/prompts/decision.md
      output: synthesis/decisions/{topic}.md
      
  # Когда сохранять синтез
  save_when:
    - research_query
    - explicit_request
    - comparison_query

# ═══════════════════════════════════════════════════════════════
# Query Classification
# ═══════════════════════════════════════════════════════════════

classification:
  # Ключевые слова для определения типа запроса
  keywords:
    library_docs:
      - "как в litestar"
      - "как в piccolo"
      - "dishka"
      - "strawberry"
      - "pydantic"
      - "documentation"
      - "api reference"
      
    error_resolution:
      - "error"
      - "ошибка"
      - "exception"
      - "не работает"
      - "failed"
      - "traceback"
      
    research:
      - "best practices"
      - "сравнить"
      - "vs"
      - "когда использовать"
      - "архитектура"
      - "паттерн"
      
    internal:
      - "в нашем проекте"
      - "по стандартам"
      - "hyper-porto"
      - "как мы делаем"
