# Interactive Training Mode Configuration
# Конфигурация системы обучения Hyper-Porto

version: "1.0"

# =============================================================================
# Уровни сложности
# =============================================================================
levels:
  beginner:
    name: "Новичок"
    description: "Первое знакомство с Hyper-Porto"
    prerequisites: []
    unlocks:
      - tutorial:01-first-action
      - simulation:create-user-module
    hints:
      enabled: true
      auto_show: true  # Автоматически показывать подсказки
      delay_seconds: 60  # Через сколько секунд предложить подсказку
    
  intermediate:
    name: "Средний"
    description: "Углублённое изучение паттернов"
    prerequisites:
      - tutorial:01-first-action
    unlocks:
      - tutorial:02-spec-driven-workflow
      - tutorial:03-debugging-with-agents
      - simulation:create-order-module
    hints:
      enabled: true
      auto_show: false
      delay_seconds: 120
    
  advanced:
    name: "Продвинутый"
    description: "Сложные сценарии и оптимизация"
    prerequisites:
      - tutorial:02-spec-driven-workflow
      - simulation:create-user-module
    unlocks:
      - simulation:microservice-extraction
      - simulation:saga-pattern
    hints:
      enabled: true
      auto_show: false
      delay_seconds: 180

# =============================================================================
# Tracking прогресса
# =============================================================================
progress:
  # Где хранить прогресс пользователя
  storage: "local"  # local | file | none
  
  # Файл для хранения (если storage: file)
  file_path: "./user_progress.json"
  
  # Что отслеживать
  track:
    tutorials:
      completed: true
      time_spent: true
      attempts: true
    simulations:
      completed: true
      time_spent: true
      hints_used: true
      score: true  # Оценка качества решения
    sandbox:
      experiments_count: true
      
  # Достижения
  achievements:
    enabled: true
    list:
      - id: first_action
        name: "Первый Action"
        description: "Создал свой первый Action"
        condition: "tutorial:01-first-action completed"
        
      - id: spec_master
        name: "Spec Master"
        description: "Освоил Spec-Driven Development"
        condition: "tutorial:02-spec-driven-workflow completed"
        
      - id: debugger
        name: "Отладчик"
        description: "Научился отлаживать с агентами"
        condition: "tutorial:03-debugging-with-agents completed"
        
      - id: module_creator
        name: "Создатель модулей"
        description: "Создал первый полноценный модуль"
        condition: "simulation:create-user-module completed"
        
      - id: no_hints
        name: "Самостоятельный"
        description: "Прошёл симуляцию без подсказок"
        condition: "any simulation completed with hints_used == 0"
        
      - id: speed_runner
        name: "Спидраннер"
        description: "Завершил симуляцию менее чем за 30 минут"
        condition: "any simulation completed with time < 30m"

# =============================================================================
# Настройки подсказок
# =============================================================================
hints:
  # Уровни подсказок (от мягких к прямым)
  levels:
    - level: 1
      name: "Направление"
      description: "Общее направление без конкретики"
      example: "Посмотри на структуру Action в Parents/"
      
    - level: 2
      name: "Конкретика"
      description: "Более конкретные указания"
      example: "Action должен наследоваться от Action[TInput, TOutput, TError]"
      
    - level: 3
      name: "Пример"
      description: "Пример кода или ссылка на документацию"
      example: "Смотри пример в docs/03-components.md"
      
    - level: 4
      name: "Решение"
      description: "Полное решение (только для обучения!)"
      example: "Вот код: ..."
  
  # Стратегия выдачи подсказок
  strategy:
    progressive: true  # Давать подсказки уровень за уровнем
    cooldown_seconds: 30  # Минимальное время между подсказками
    max_hints_per_step: 4  # Максимум подсказок на шаг

# =============================================================================
# Туториалы
# =============================================================================
tutorials:
  base_path: "./tutorials"
  
  available:
    - id: 01-first-action
      file: "01-first-action.md"
      level: beginner
      estimated_time: "30 мин"
      topics:
        - Action
        - Result[T, E]
        - Pydantic DTO
        - DI регистрация
      
    - id: 02-spec-driven-workflow
      file: "02-spec-driven-workflow.md"
      level: intermediate
      estimated_time: "45 мин"
      prerequisites:
        - 01-first-action
      topics:
        - Spec-файлы
        - Генерация кода
        - Итеративная разработка
      
    - id: 03-debugging-with-agents
      file: "03-debugging-with-agents.md"
      level: intermediate
      estimated_time: "40 мин"
      prerequisites:
        - 01-first-action
      topics:
        - Отладка Result
        - DI ошибки
        - Трейсинг

# =============================================================================
# Симуляции
# =============================================================================
simulations:
  base_path: "./simulations"
  
  # Где создавать временные файлы симуляции
  workspace: "./sandbox/simulation_workspace"
  
  # Автоматическая очистка после завершения
  auto_cleanup: false
  
  available:
    - id: create-user-module
      path: "create-user-module"
      level: beginner
      estimated_time: "45 мин"
      description: "Создание модуля User с нуля"
      skills:
        - Создание структуры модуля
        - Написание Action
        - Repository pattern
        - Регистрация в DI

# =============================================================================
# Sandbox (Песочница)
# =============================================================================
sandbox:
  path: "./sandbox"
  
  # Максимальный размер файлов в sandbox
  max_file_size_kb: 100
  
  # Максимальное количество файлов
  max_files: 50
  
  # Автоматическая очистка
  auto_cleanup:
    enabled: false
    after_days: 7
  
  # Шаблоны для быстрого создания
  templates:
    - name: "action"
      description: "Базовый Action"
      command: "sandbox создай action"
      
    - name: "task"
      description: "Базовый Task"
      command: "sandbox создай task"
      
    - name: "controller"
      description: "Базовый Controller"
      command: "sandbox создай controller"

# =============================================================================
# Валидация
# =============================================================================
validation:
  # Проверки для туториалов и симуляций
  checks:
    - id: imports
      name: "Абсолютные импорты"
      description: "Проверка, что используются только абсолютные импорты"
      pattern: "^from src\\."
      
    - id: result_return
      name: "Return Result"
      description: "Action возвращает Result[T, E]"
      pattern: "-> Result\\["
      
    - id: pydantic_dto
      name: "Pydantic DTO"
      description: "DTO наследуются от BaseModel"
      pattern: "class \\w+\\(BaseModel\\)"
      
    - id: frozen_errors
      name: "Frozen Errors"
      description: "Ошибки — frozen Pydantic модели"
      pattern: 'frozen.*=.*True|model_config.*frozen'

# =============================================================================
# Сообщения
# =============================================================================
messages:
  welcome: |
    Добро пожаловать в Interactive Training Mode!
    
    Я помогу тебе освоить архитектуру Hyper-Porto через практику.
    
    Начни с команды: @training старт
    Или выбери туториал: @training туториалы
  
  tutorial_complete: |
    Отлично! Туториал "{name}" завершён!
    
    Время: {time}
    Следующий шаг: {next_step}
  
  simulation_complete: |
    Симуляция "{name}" пройдена!
    
    Время: {time}
    Подсказок использовано: {hints_used}
    Оценка: {score}/100
  
  hint_offered: |
    Кажется, ты застрял. Хочешь подсказку?
    
    Скажи: @training подсказка
  
  achievement_unlocked: |
    Достижение разблокировано: {name}!
    
    {description}
