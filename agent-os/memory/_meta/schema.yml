# Schema for Agent Memory System
# Version: 2.0.0

version: "2.0.0"

# ═══════════════════════════════════════════════════════════════
# Entry Types
# ═══════════════════════════════════════════════════════════════

entry_types:
  decision:
    id_format: "ADR-{NNN}"
    location: "knowledge/architecture/adr/"
    required_fields:
      - title
      - status
      - context
      - decision
      - consequences
    optional_fields:
      - alternatives
      - supersedes
      - related
    statuses:
      - proposed
      - accepted
      - deprecated
      - superseded

  pattern:
    id_format: "PAT-{NNN}"
    location: "knowledge/patterns/{status}/"
    required_fields:
      - title
      - status
      - when_to_use
      - implementation
    optional_fields:
      - when_not_to_use
      - examples
      - usage_count
      - last_used
    statuses:
      - experimental
      - verified

  mistake:
    id_format: "MIST-{YYYYMMDD}-{NNN}"
    location: "learning/mistakes/by-category/{category}.md"
    required_fields:
      - title
      - category
      - severity
      - description
      - root_cause
      - solution
    optional_fields:
      - module
      - symptoms
      - prevention
      - related
    categories:
      - imports
      - typing
      - async
      - di
      - result-pattern
      - architecture
      - logic
      - other
    severities:
      - critical   # Блокирует работу, потеря данных
      - major      # Серьёзная проблема, workaround есть
      - minor      # Незначительно, легко исправить

  insight:
    id_format: "INS-{YYYYMMDD}-{NNN}"
    location: "learning/insights/{YYYY-MM}/"
    required_fields:
      - title
      - observation
      - implications
    optional_fields:
      - evidence
      - action_items

  session:
    id_format: "{YYYY-MM-DD}-{ID}"
    location: "experience/sessions/{YYYY}/{MM}/"
    required_fields:
      - date
      - type
      - goal
      - result
    optional_fields:
      - duration
      - decisions
      - lessons
      - rating
      - comment

# ═══════════════════════════════════════════════════════════════
# Tags Taxonomy
# ═══════════════════════════════════════════════════════════════

tags:
  components:
    - action
    - task
    - query
    - repository
    - uow
    - event
    - controller
    - model
    - schema

  patterns:
    - result
    - failure
    - success
    - railway
    - cqrs
    - di

  technical:
    - import
    - typing
    - async
    - sync
    - decorator

  libraries:
    - litestar
    - piccolo
    - strawberry
    - dishka
    - returns
    - anyio
    - pydantic

  severity:
    - critical
    - major
    - minor

  # Dynamic tags (auto-generated)
  dynamic:
    - "module:{ModuleName}"
    - "section:{SectionName}"

# ═══════════════════════════════════════════════════════════════
# Relations
# ═══════════════════════════════════════════════════════════════

relation_types:
  - led_to          # Ошибка привела к паттерну
  - supersedes      # Заменяет другую запись
  - similar_to      # Похожая проблема/решение
  - related         # Общая связь
  - implements      # Реализует решение
  - prevents        # Предотвращает ошибку

# ═══════════════════════════════════════════════════════════════
# Lifecycle Rules
# ═══════════════════════════════════════════════════════════════

lifecycle:
  # Когда продвигать из experience в learning
  experience_to_learning:
    similar_mistakes_threshold: 3
    pattern_usage_threshold: 5

  # Когда продвигать из learning в knowledge
  learning_to_knowledge:
    pattern_verified_threshold: 10
    days_without_issues: 30

  # Когда архивировать
  archival:
    session_age_days: 365
    unused_pattern_days: 180

# ═══════════════════════════════════════════════════════════════
# Analytics
# ═══════════════════════════════════════════════════════════════

analytics:
  weekly_report:
    generate_on: "sunday"
    include:
      - session_stats
      - top_mistakes
      - new_patterns
      - trends
      - recommendations

  monthly_report:
    generate_on: "1"  # First day of month
    include:
      - all_weekly_aggregated
      - improvement_areas
      - knowledge_growth
