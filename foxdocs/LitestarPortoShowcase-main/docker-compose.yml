version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porto-litestar
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: python -m src.Main
    networks:
      - porto-network

networks:
  porto-network:
    driver: bridge
