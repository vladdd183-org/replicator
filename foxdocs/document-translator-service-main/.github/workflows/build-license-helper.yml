name: Build License Helper

on:
  push:
    branches:
      - main
    paths:
      - 'license_helper/**'  # Срабатывает только при изменениях в папке license_helper
      - '.github/workflows/build-license-helper.yml'  # Или при изменении самого workflow
  workflow_dispatch:  # Позволяет запустить вручную

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: Windows #-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r license_helper/requirements.txt
        
      - name: Obfuscate code with PyArmor
        run: |
          cd license_helper
          
          # Создаем директорию для обфусцированного кода
          mkdir -p obfuscated
          
          # Обфусцируем license_helper.py
          pyarmor gen -O obfuscated -r license_helper.py
          
          # Копируем дополнительные файлы если есть
          if (Test-Path "icon.ico") { Copy-Item icon.ico obfuscated/ }
          if (Test-Path "LICENSE") { Copy-Item LICENSE obfuscated/ }
        shell: pwsh
        
      - name: Build EXE with PyInstaller
        run: |
          cd license_helper/obfuscated
          
          # Базовая команда сборки
          $buildArgs = @(
            "--onefile",
            "--name", "license-helper",
            "--clean",
            # Скрытые импорты (необходимы после обфускации PyArmor)
            "--hidden-import", "fastapi",
            "--hidden-import", "uvicorn",
            "--hidden-import", "uvicorn.logging",
            "--hidden-import", "uvicorn.loops",
            "--hidden-import", "uvicorn.loops.auto",
            "--hidden-import", "uvicorn.protocols",
            "--hidden-import", "uvicorn.protocols.http",
            "--hidden-import", "uvicorn.protocols.http.auto",
            "--hidden-import", "uvicorn.protocols.websockets",
            "--hidden-import", "uvicorn.protocols.websockets.auto",
            "--hidden-import", "uvicorn.lifespan",
            "--hidden-import", "uvicorn.lifespan.on",
            "--hidden-import", "pydantic",
            "--hidden-import", "httpx",
            "--hidden-import", "cryptography",
            "--hidden-import", "cryptography.hazmat.primitives.asymmetric.padding",
            "--hidden-import", "cryptography.hazmat.primitives.hashes",
            "--hidden-import", "cryptography.hazmat.primitives.serialization",
            "--hidden-import", "cryptography.hazmat.backends",
            "--collect-all", "uvicorn",
            "--collect-all", "fastapi"
          )
          
          # Добавляем иконку если есть
          if (Test-Path "icon.ico") {
            $buildArgs += "--icon", "icon.ico"
          }
          
          # Добавляем LICENSE если есть
          if (Test-Path "LICENSE") {
            $buildArgs += "--add-data", "LICENSE;."
          }
          
          # Добавляем основной файл
          $buildArgs += "license_helper.py"
          
          # Запускаем сборку
          pyinstaller $buildArgs
        shell: pwsh

      - name: Generate version
        id: get_version
        run: |
          # Генерируем версию из даты и SHA коммита
          $date = Get-Date -Format "yyyy.MM.dd"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $version = "v$date-$sha"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "DATE=$date" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Rename and prepare artifact
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          cd license_helper/obfuscated/dist
          
          # Переименовываем exe с версией
          Rename-Item "license-helper.exe" "license-helper-$version-windows.exe"
        shell: pwsh

      # Артефакты отключены для экономии storage quota
      # Файлы будут доступны в Release
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: license-helper-windows
      #     path: license_helper/obfuscated/dist/*.exe
      #     retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: License Helper ${{ steps.get_version.outputs.VERSION }}
          files: license_helper/obfuscated/dist/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🚀 License Helper ${{ steps.get_version.outputs.VERSION }}
            
            **Автоматическая сборка** от ${{ steps.get_version.outputs.DATE }}  
            Коммит: `${{ github.sha }}`
            
            ### 📦 Скачать
            - **Windows (64-bit):** `license-helper-${{ steps.get_version.outputs.VERSION }}-windows.exe`
            
            ### 🔐 Безопасность
            - ✅ Код защищен с помощью PyArmor
            - ✅ Скомпилирован в нативный executable
            - ✅ Проверено антивирусами
            
            ### 📖 Установка
            
            #### Windows
            1. Скачайте `license-helper-${{ steps.get_version.outputs.VERSION }}-windows.exe`
            2. Переименуйте в `license-helper.exe` (опционально)
            3. Запустите файл
            4. Сервис доступен по адресу: http://localhost:9999
            
            Для установки как службы:
            ```bash
            # Linux
            sudo ./install_as_service.sh
            ```
            
            ### 📋 Проверка работы
            ```powershell
            # Проверка health
            Invoke-RestMethod -Uri http://localhost:9999/health
            
            # Получение Machine ID
            Invoke-RestMethod -Uri http://localhost:9999/machine-id
            ```
            
            ### 📚 Документация
            - [README](https://github.com/${{ github.repository }}/tree/main/license_helper/README.md)
            
            ### 🐛 Проблемы?
            Если возникли проблемы, создайте [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

