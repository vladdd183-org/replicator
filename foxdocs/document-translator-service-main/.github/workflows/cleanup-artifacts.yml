name: Cleanup Old Artifacts

on:
  schedule:
    # Запускать каждый день в 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Можно запустить вручную

jobs:
  cleanup:
    name: Delete Old Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete artifacts older than 7 days
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '7 days'
          skip-recent: 5  # Оставить последние 5 артефактов

